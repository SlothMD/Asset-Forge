cross_cutting_concerns:
  local_first:
    - Portable project data must remain useful without hosted services.
    - Machine-specific paths and tool config stay outside project metadata.
  deterministic_outputs:
    - Preview and export should use shared renderer logic.
    - Build inputs should be snapshotted for reproducibility.
  security:
    - Secrets are never stored in project.json or tracked refs.
    - Provider credentials use OS credential storage or backend-held secrets.
  reviewability:
    - Tool decisions should produce manifests and audit logs.
    - Staged/generated assets should be reviewed before promotion.
  ui:
    - Follow refs/UI guidance for compact, stable, information-dense tool surfaces.
    - Prefer explicit path controls and visible current state for local tool workflows.

open_questions:
  - Which modules should become separate packages versus app-local tool surfaces?
  - What is the first hosted account backend project and production domain mapping?
  - Should model/image optimization move into Rust workers, sidecars, or remain command-driven first?
  - What is the canonical providerLinks schema for GitHub, Steam, TTS, and The Game Crafter?
  - Which export target should define the first full build-manager workflow: print-and-play PDF, TTS deck, or runtime asset bundle?
