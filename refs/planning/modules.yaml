    current_state:
      - Tauri v2 shell exists.
      - React/Vite frontend exists.
      - Release and dev launch scripts exist.
      - Bundle icon is configured.
    near_term_work:
      - Keep release-shape launch path healthy.
      - Add app-level navigation and compact launcher state for account/project awareness.
      - Keep frontend access to filesystem and shell actions behind narrow commands.
    dependencies:
      - tauri-bridge
      - project-launcher
      - machine-config

  - id: tauri-bridge
    name: Tauri Bridge
    status: partial
    owner_area: apps/desktop/src-tauri
    package_or_path: apps/desktop/src-tauri/src/lib.rs
    responsibility: Provide Rust-backed commands for project IO, local machine bindings, Git sync, path selection, scans, optimization, and future worker execution.
    current_state:
      - Project creation/open/update commands exist.
      - Machine-local project link registry exists.
      - Git status, pull, and push commands exist for linked local folders.
      - Asset/tool commands have expanded in the current app surface.
    near_term_work:
      - Keep commands narrow and typed.
